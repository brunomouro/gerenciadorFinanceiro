spring:
  application:
    name: gerenciador-financeiro

  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterAccess=1m,recordStats

  flyway:
    schemas: public

  jpa:
    properties:
      hibernate:
        default_schema: public

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

api:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-expiration: 60000
      refresh-expiration: 120000

spring.mail:
  host: smtp.gmail.com
  port: 587
  username: ${EMAIL_USERNAME}
  password: ${EMAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true